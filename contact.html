<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div class="container">
    
        <div class="login-form">
          <h2>Talk to us</h2>
          <form id="login-form">
            <div class="mb-3">
              <input type="text" class="form-control" id="Name" placeholder="Name" required>
            </div>
            <div class="mb-3">
              <input type="email" class="form-control" id="Email ID" placeholder="Email ID"  required>
            </div>
            <div class="mb-3">
              <input type="number" class="form-control" id="Phone Number" placeholder="Phone number" required>
            </div>
            <div class="mb-3">
              <input type="text" class="form-control" id="Purpose" placeholder="Purpose" required>
            </div>
            <div class="mb-3">
              <input type="text" class="form-control" id="Message" placeholder="Message" required>
        
            <button type="submit" class="btn btn-primary btn-custom">Submit</button>
    
          </form>
        </div>
      
    </div>
  
</body>
</html>
